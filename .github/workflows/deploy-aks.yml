name: Build en Deploy naar AKS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY_NAME: <jouw-acr-naam>          # bv. mijnbedrijfacr
  RESOURCE_GROUP: <jouw-resource-group>
  CLUSTER_NAME: <jouw-aks-cluster-naam>
  IMAGE_NAME: aks-demo-app
  NAMESPACE: default

permissions:
  id-token: write   # nodig voor OIDC login naar Azure
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Azure login via OIDC (geen client secret nodig) ---
      - name: Log in bij Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # --- Build & push image via ACR Tasks (geen docker login nodig) ---
      - name: Build en push image naar ACR
        run: |
          az acr build \
            --registry ${{ env.REGISTRY_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            .

      # --- AKS credentials ophalen ---
      - name: Haal AKS context op
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}

      # --- Image tag in manifest zetten ---
      - name: Vervang image tag in deployment manifest
        run: |
          sed -i "s#REGISTRY_NAME.azurecr.io/aks-demo-app:IMAGE_TAG#${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}#g" k8s/deployment.yaml

      # --- Deployen naar AKS ---
      - name: Deploy naar AKS
        uses: azure/k8s-deploy@v5
        with:
          namespace: ${{ env.NAMESPACE }}
          manifests: |
            k8s/deployment.yaml
            k8s/service.yaml
          images: |
            ${{ env.REGISTRY_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Toon service endpoint
        run: kubectl get service aks-demo-app -n ${{ env.NAMESPACE }}
